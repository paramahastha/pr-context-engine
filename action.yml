name: PR Context Briefing
description: Post a senior-engineer-style briefing on every pull request — what changed, blast radius, risk flags, and three sharp review questions.
author: paramahastha

inputs:
  groq-api-key:
    description: Groq API key (free at https://console.groq.com/keys).
    required: false
  gemini-api-key:
    description: Google Gemini API key (https://aistudio.google.com/apikey).
    required: false
  anthropic-api-key:
    description: Anthropic API key. Required when llm-provider=anthropic.
    required: false
  ollama-base-url:
    description: Ollama server URL. Used when llm-provider=ollama.
    required: false
    default: "http://localhost:11434"
  ollama-model:
    description: Ollama model name. Used when llm-provider=ollama.
    required: false
    default: "qwen2.5-coder:7b"
  github-token:
    description: GitHub token with pull-requests:write. Defaults to the built-in GITHUB_TOKEN.
    required: false
    default: ${{ github.token }}
  enable-fixes:
    description: Set to 'true' to generate opt-in, confidence-gated fix suggestions (default off).
    required: false
    default: "false"
  llm-provider:
    description: >
      Primary LLM provider — groq | gemini | anthropic | ollama (default: groq).
      Must match the API key you provide: set gemini + gemini-api-key,
      anthropic + anthropic-api-key, etc.
    required: false
    default: "groq"

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 50

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Restore embedding model cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/fastembed
        key: fastembed-bge-small-en-v1.5

    - name: Restore index cache
      uses: actions/cache@v4
      with:
        path: index.db
        key: pr-engine-index-${{ github.event.pull_request.base.sha }}
        restore-keys: pr-engine-index-

    - name: Install pr-context-engine
      shell: bash
      run: pip install pr-context-engine

    - name: Generate briefing
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        OLLAMA_BASE_URL: ${{ inputs.ollama-base-url }}
        OLLAMA_MODEL: ${{ inputs.ollama-model }}
        LLM_PROVIDER: ${{ inputs.llm-provider }}
        ENABLE_FIXES: ${{ inputs.enable-fixes }}
      run: >
        pr-context-engine review
        --pr ${{ github.event.pull_request.number }}
        --repo ${{ github.repository }}

branding:
  icon: eye
  color: blue
